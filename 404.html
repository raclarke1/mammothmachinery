<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Mammoth Machinery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .error-page h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 900;
      color: #F59E0B;
      line-height: 1;
    }
    .error-page h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.5rem;
      margin: 16px 0;
    }
    .error-page p {
      color: #9CA3AF;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }
    .error-page a {
      display: inline-block;
      padding: 14px 32px;
      background: #F59E0B;
      color: #111;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      text-decoration: none;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.3s;
    }
    .error-page a:hover {
      background: #D97706;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <h1>404</h1>
    <h2>This Page Has Left the Job Site</h2>
    <p>Looks like this equipment has been moved. Let's get you back on track.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
